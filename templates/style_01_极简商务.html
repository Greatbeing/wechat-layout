<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简商务风格模板</title>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; }
        .preview-container { max-width: 677px; margin: 0 auto; background: #fff; padding: 40px 20px; }
    </style>
</head>
<body>
    <div class="preview-container">
        <section style="margin:0 auto;max-width:677px;">
            
            <!-- 文章标题 -->
            <h1 style="font-size:22px;font-weight:bold;color:#1a1a2e;text-align:center;letter-spacing:2px;margin:40px 0 30px 0;line-height:1.5;">
                文章标题
            </h1>
            
            <!-- 副标题 -->
            <p style="font-size:14px;color:#666666;text-align:center;letter-spacing:1px;margin:0 0 40px 0;">
                副标题 · 简短描述
            </p>
            
            <!-- 分割线 -->
            <p style="border-top:1px dashed #d0d8e4;margin:0 0 40px 0;"></p>
            
            <!-- 正文 -->
            <p style="font-size:15px;color:#333333;text-align:justify;line-height:2.0;margin:0 0 20px 0;letter-spacing:0.3px;">
                正文采用15px字体，行高2倍。商务风格注重信息的清晰传达，避免过多装饰。每个段落保持适度的长度，建议2-4行。
            </p>
            
            <!-- 二级标题 -->
            <h2 style="font-size:18px;font-weight:bold;color:#1a1a2e;margin:36px 0 20px 0;padding-bottom:8px;border-bottom:1px solid #d0d8e4;line-height:1.4;">
                二级标题 · 结构清晰
            </h2>
            
            <!-- 数据卡片 -->
            <p style="font-size:15px;color:#333333;text-align:justify;line-height:2.0;margin:0 0 20px 0;">
                商务风格常用数据卡片展示关键信息：
            </p>
            
            <!-- 引用块 -->
            <blockquote style="margin:24px 0;padding:16px 20px;background:#f5f7fa;border-left:3px solid #1a1a2e;">
                <p style="font-size:14px;color:#555555;line-height:1.8;margin:0;">
                    引用内容，用于强调重要观点或数据来源。商务风格保持简洁专业。
                </p>
            </blockquote>
            
            <!-- 列表 -->
            <ul style="margin:24px 0;padding-left:0;list-style-type:none;">
                <li style="font-size:14px;color:#333333;line-height:1.8;margin:0 0 10px 0;padding-left:20px;position:relative;border-left:2px solid #d0d8e4;">
                    <span style="position:absolute;left:-2px;top:8px;width:6px;height:6px;background:#1a1a2e;border-radius:50%;"></span>
                    列表项一 · 简洁明了
                </li>
                <li style="font-size:14px;color:#333333;line-height:1.8;margin:0 0 10px 0;padding-left:20px;position:relative;border-left:2px solid #d0d8e4;">
                    <span style="position:absolute;left:-2px;top:8px;width:6px;height:6px;background:#1a1a2e;border-radius:50%;"></span>
                    列表项二 · 层次分明
                </li>
                <li style="font-size:14px;color:#333333;line-height:1.8;margin:0 0 10px 0;padding-left:20px;position:relative;border-left:2px solid #d0d8e4;">
                    <span style="position:absolute;left:-2px;top:8px;width:6px;height:6px;background:#1a1a2e;border-radius:50%;"></span>
                    列表项三 · 重点突出
                </li>
            </ul>
            
            <!-- 分割线 -->
            <p style="border-top:1px dashed #d0d8e4;margin:32px 0;"></p>
            
            <!-- 底部留白 -->
            <p style="height:40px;"></p>
            
        </section>
    </div>
</body>
</html>
