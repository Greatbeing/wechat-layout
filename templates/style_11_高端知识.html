<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高端知识风格模板</title>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; }
        .preview-container { max-width: 677px; margin: 0 auto; background: #fff; padding: 40px 20px; }
    </style>
</head>
<body>
    <div class="preview-container">
        <section style="margin:0 auto;max-width:677px;">
            
            <!-- 文章标题 -->
            <h1 style="font-size:24px;font-weight:bold;color:#c4a35a;text-align:center;letter-spacing:4px;margin:40px 0 30px 0;line-height:1.5;padding-bottom:16px;border-bottom:2px solid #c4a35a;display:inline-block;">
                文章标题
            </h1>
            
            <!-- 副标题 -->
            <p style="font-size:14px;color:#888888;text-align:center;letter-spacing:2px;margin:0 0 40px 0;">
                副标题描述 · 简洁有力
            </p>
            
            <!-- 正文 -->
            <p style="font-size:15px;color:#3d3d3d;text-align:justify;line-height:2.0;margin:0 0 20px 0;letter-spacing:0.5px;text-indent:2em;">
                正文字体采用15px，行高2倍，字间距0.5px。段落首行缩进2em，符合传统阅读习惯。金棕色强调色(#c4a35a)用于标题和关键词突出。
            </p>
            
            <!-- 波浪装饰线 -->
            <p style="text-align:center;margin:40px 0 32px 0;">
                <span style="display:inline-block;color:#c4a35a;font-size:14px;letter-spacing:6px;">◆ ── ◆ ── ◆</span>
            </p>
            
            <!-- 二级标题 -->
            <h2 style="font-size:18px;font-weight:bold;color:#c4a35a;margin:40px 0 20px 0;text-align:center;letter-spacing:3px;">
                ◆ 二级标题 ◆
            </h2>
            
            <!-- 人物卡片示例 -->
            <p style="font-size:15px;color:#3d3d3d;text-align:justify;line-height:2.0;margin:0 0 20px 0;letter-spacing:0.5px;">
                人物卡片：用于介绍重要人物，配以圆形头像和身份标签。
            </p>
            
            <!-- 人物卡片 -->
            <div style="margin:24px 0;padding:24px;background:#ffffff;border:1px solid #c4a35a;border-radius:8px;text-align:center;">
                <p style="margin:0 0 16px 0;">
                    <img src="头像URL" style="width:80px;height:80px;border-radius:50%;border:3px solid #c4a35a;" />
                </p>
                <p style="font-size:16px;font-weight:bold;color:#3d3d3d;margin:0 0 8px 0;">人物姓名</p>
                <p style="font-size:12px;color:#888888;margin:0 0 12px 0;">身份标签 · 职业描述</p>
                <p style="font-size:13px;color:#666666;line-height:1.8;margin:0;">人物简介描述...</p>
            </div>
            
            <!-- 引用块 -->
            <blockquote style="margin:28px 0;padding:20px 24px;background:#f5f5f0;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.05);">
                <p style="font-size:14px;color:#5a5a5a;line-height:1.9;margin:0;text-align:center;font-style:italic;">
                    「引用内容，可以用来强调重要观点或名人名言。」
                </p>
            </blockquote>
            
            <!-- 三级标题 -->
            <h3 style="font-size:16px;font-weight:600;color:#8b7355;margin:28px 0 14px 0;padding-left:14px;border-left:2px solid #8b7355;letter-spacing:1px;line-height:1.4;">
                三级标题 · 重点标注
            </h3>
            
            <!-- 关键词高亮 -->
            <p style="font-size:15px;color:#3d3d3d;text-align:justify;line-height:2.0;margin:0 0 20px 0;letter-spacing:0.5px;">
                关键词可使用<span style="background:#fff3cd;padding:2px 6px;border-radius:4px;color:#c4a35a;font-weight:bold;">高亮标注</span>突出显示。
            </p>
            
            <!-- 列表 -->
            <ul style="margin:24px 0;padding-left:0;list-style-type:none;">
                <li style="font-size:14px;color:#3d3d3d;line-height:1.9;margin:0 0 12px 0;padding-left:20px;position:relative;">
                    <span style="position:absolute;left:0;color:#c4a35a;">◆</span>列表项一
                </li>
                <li style="font-size:14px;color:#3d3d3d;line-height:1.9;margin:0 0 12px 0;padding-left:20px;position:relative;">
                    <span style="position:absolute;left:0;color:#c4a35a;">◆</span>列表项二
                </li>
                <li style="font-size:14px;color:#3d3d3d;line-height:1.9;margin:0 0 12px 0;padding-left:20px;position:relative;">
                    <span style="position:absolute;left:0;color:#c4a35a;">◆</span>列表项三
                </li>
            </ul>
            
            <!-- 分割线 -->
            <p style="text-align:center;margin:40px 0 32px 0;">
                <span style="display:inline-block;color:#c4a35a;font-size:14px;letter-spacing:6px;">◆ ── ◆ ── ◆</span>
            </p>
            
            <!-- 底部留白 -->
            <p style="height:40px;"></p>
            
        </section>
    </div>
</body>
</html>
