<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风格2: 清新文艺</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #fff;
            padding: 20px;
            max-width: 677px;
            margin: 0 auto;
        }
        .style-header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .style-number {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin: 0 auto 15px;
        }
        .style-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        .style-desc {
            font-size: 14px;
            color: #666;
        }
        .content {
            padding: 0;
        }
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="style-header">
        <div class="style-number">2</div>
        <div class="style-title">清新文艺</div>
        <div class="style-desc">适合生活方式、阅读类内容，柔和优雅，营造宁静氛围</div>
    </div>
    <div class="content">
        
            <div class="style-header">
                <div class="style-number">2</div>
                <div class="style-info">
                    <h2>清新文艺</h2>
                    <p>适合生活方式、阅读类内容，柔和优雅，营造宁静氛围</p>
                </div>
                <button class="copy-btn" onclick="copyStyle(2)">复制全部代码</button>
            </div>
            <div class="preview-box" id="preview-2">
                <!-- 头图Banner -->
                <div style="background: linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 100%); padding: 50px 30px; border-radius: 16px 16px 0 0; text-align: center; margin-bottom: 30px; position: relative; overflow: hidden;">
                    <div style="position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background: rgba(129,199,132,0.2); border-radius: 50%;"></div>
                    <div style="position: absolute; bottom: -20px; left: -20px; width: 80px; height: 80px; background: rgba(165,214,167,0.3); border-radius: 50%;"></div>
                    <div style="font-family: 'STKaiti', 'KaiTi', serif; font-size: 14px; color: #689f38; letter-spacing: 6px; margin-bottom: 20px;">慢 生 活</div>
                    <h1 style="font-family: 'STKaiti', 'KaiTi', serif; font-size: 32px; color: #2e7d32; font-weight: normal; margin: 0; line-height: 1.5;">在时光里，<br>遇见更好的自己</h1>
                    <div style="margin-top: 25px;">
                        <span style="display: inline-block; width: 40px; height: 1px; background: #81c784; vertical-align: middle;"></span>
                        <span style="font-size: 13px; color: #689f38; margin: 0 15px;">春日随笔</span>
                        <span style="display: inline-block; width: 40px; height: 1px; background: #81c784; vertical-align: middle;"></span>
                    </div>
                </div>

                <!-- 导语 -->
                <div style="background: #fff; padding: 25px 30px; border-radius: 0 0 16px 16px; margin: -30px 0 30px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
                    <p style="font-size: 15px; color: #555; line-height: 2; margin: 0; text-align: center; font-style: italic;">
                        "生活不是等待暴风雨过去，而是学会在雨中跳舞。"
                    </p>
                </div>

                <!-- 一级标题 -->
                <div style="margin: 35px 0; text-align: center;">
                    <div style="display: inline-block; position: relative;">
                        <h2 style="font-family: 'STKaiti', 'KaiTi', serif; font-size: 24px; color: #2e7d32; font-weight: normal; margin: 0;">一、春日里的慢时光</h2>
                        <div style="position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 60px; height: 2px; background: linear-gradient(90deg, transparent, #81c784, transparent);">
    </div>
</body>
</html>
