<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风格5: 复古优雅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #fff;
            padding: 20px;
            max-width: 677px;
            margin: 0 auto;
        }
        .style-header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .style-number {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin: 0 auto 15px;
        }
        .style-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        .style-desc {
            font-size: 14px;
            color: #666;
        }
        .content {
            padding: 0;
        }
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="style-header">
        <div class="style-number">5</div>
        <div class="style-title">复古优雅</div>
        <div class="style-desc">适合文化历史、艺术内容，古典韵味，气质独特</div>
    </div>
    <div class="content">
        
            <div class="style-header">
                <div class="style-number">5</div>
                <div class="style-info">
                    <h2>复古优雅</h2>
                    <p>适合怀旧主题、文化内容，温暖复古，充满时光韵味</p>
                </div>
                <button class="copy-btn" onclick="copyStyle(5)">复制全部代码</button>
            </div>
            <div class="preview-box" id="preview-5">
                <!-- 头图Banner -->
                <div style="background: linear-gradient(180deg, #f5e6d3 0%, #e8d4c4 100%); padding: 50px 30px; border-radius: 4px; text-align: center; margin-bottom: 30px; border: 8px solid #fff; box-shadow: 0 4px 20px rgba(139,69,19,0.15); position: relative;">
                    <div style="position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px; border: 1px solid #d2691e; opacity: 0.3;"></div>
                    <div style="font-family: 'STKaiti', 'KaiTi', serif; font-size: 13px; color: #8b4513; letter-spacing: 8px; margin-bottom: 20px;">旧 时 光</div>
                    <h1 style="font-family: 'STKaiti', 'KaiTi', serif; font-size: 34px; color: #5d3a1a; font-weight: normal; margin: 0; line-height: 1.4;">岁月如歌，<br>往事如烟</h1>
                    <div style="margin-top: 25px;">
                        <span style="display: inline-block; width: 30px; height: 1px; background: #d2691e; vertical-align: middle;"></span>
                        <span style="font-family: 'STKaiti', 'KaiTi', serif; font-size: 14px; color: #8b4513; margin: 0 15px;">一九八零年代回忆录</span>
                        <span style="display: inline-block; width: 30px; height: 1px; background: #d2691e; vertical-align: middle;"></span>
                    </div>
                </div>

                <!-- 导语 -->
                <div style="background: #faf6f1; padding: 25px 30px; border-radius: 4px; margin-bottom: 30px; border-left: 4px solid #d2691e;">
                    <p style="font-family: 'STKaiti', 'KaiTi', serif; font-size: 15px; color: #5d3a1a; line-height: 2; margin: 0;">
                        "那些年，时光很慢，车马邮件都慢，一生只够爱一个人。"
                    </p>
                </div>

                <!-- 一级标题 -->
                <div style="margin: 35px 0; text-align: center;">
                    <div style="display: inline-block; position: relative;">
                        <div style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 60px; height: 1px; background: #d2691e;"></div>
                        <h2 style="font-family: 'STKaiti', 'KaiTi', serif; font-size: 26px; color: #5d3a1a; font-weight: normal; margin: 0; padding: 0 20px;">第一章：老街记忆</h2>
                        <div style="position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 60px; height: 1px; background: #d2691e;">
    </div>
</body>
</html>
